# ============================================================
# Transformer OCR System — Configuration v6
# ============================================================
# Optimized for Aadhaar cards and Indian documents
# Using default DocTR thresholds for cleaner output
# ============================================================

device: "cpu"       # "cpu" | "cuda"

# ============================================================
# DPI Settings
# ============================================================
dpi: 300

dpi_settings:
  digital:        150   # vector PDF — low DPI is fine
  scanned:        300   # standard scan

# ============================================================
# OCR Engine - Fixed to doctr
# ============================================================
engine: "doctr"     # Fixed to doctr (don't use auto)

surya:
  langs: ["en"]

doctr:
  det_arch: "db_resnet50"
  # CRNN is simpler, produces less hallucination
  reco_arch: "crnn_vgg16_bn"
  assume_straight_pages: true

  # ============================================================
  # DETECTION THRESHOLDS - DEFAULT VALUES
  # ============================================================
  # Using DocTR default values (0.5/0.5) for cleaner detection
  # This eliminates most garbage at source
  
  bin_thresh: 0.5    # DEFAULT - only clear text regions
  box_thresh: 0.5    # DEFAULT - only high-confidence boxes

recognition:
  variant: "printed"
  num_beams: 4
  max_length: 128

trocr:
  variant: "printed"
  num_beams: 4
  max_length: 128

# ============================================================
# CONFIDENCE THRESHOLDS
# ============================================================
# Higher threshold to filter remaining garbage
min_confidence: 0.5    # Balanced threshold

# ============================================================
# POST-PROCESSING - Enhanced Statistical Filtering
# ============================================================
post_process:
  # Basic filters
  min_confidence: 0.5        # Match global setting
  min_text_length: 2         # Allow short tokens (like "DOB:", "VID:")
  
  # NMS (Non-Maximum Suppression)
  nms_iou_threshold: 0.5     # Remove overlapping boxes
  
  # Noise filtering
  filter_noise: true
  
  # Column detection
  column_detection: true
  min_col_gap_fraction: 0.06
  
  # Reading order
  enable_reading_order: true
  
  # ============================================================
  # LINE MERGING - Fixes split text
  # ============================================================
  enable_merge: true
  merge_threshold: 20        # Larger to catch nearby words
  large_text_merge_boost: 2.5
  large_text_height_px: 40
  
  # Column bleeding fix
  max_merge_x_fraction: 0.30
  
  # ============================================================
  # LOGO SUPPRESSION
  # ============================================================
  logo_zone_x_fraction: 0.20
  logo_zone_y_fraction: 0.18
  logo_top_band_y_fraction: 0.06
  
  # ============================================================
  # TABLE STITCHING
  # ============================================================
  enable_desc_stitch: true
  
  # ============================================================
  # TEXT NORMALISATION
  # ============================================================
  enable_text_normalisation: true   # Just removes extra spaces
  
  # ============================================================
  # ENGLISH-ONLY FILTER - REMOVES HINDI AND OTHER SCRIPTS
  # ============================================================
  english_only: true

# ============================================================
# OUTPUT SETTINGS
# ============================================================
output:
  save_images: true
  json_output_dir: "output/json"
  image_output_dir: "output/images"