# ============================================================
# Transformer OCR System — Configuration v7 (Aadhaar Optimized)
# ============================================================
# Optimized specifically for Aadhaar cards and Indian documents
# Using PARSeq for better recognition and lower thresholds
# ============================================================

device: "cpu"       # "cpu" | "cuda"

# ============================================================
# DPI Settings
# ============================================================
dpi: 300

dpi_settings:
  digital:        150   # vector PDF — low DPI is fine
  scanned:        300   # standard scan

# ============================================================
# OCR Engine - Fixed to doctr with PARSeq
# ============================================================
engine: "doctr"     # Fixed to doctr

surya:
  langs: ["en"]

doctr:
  det_arch: "db_resnet50"
  # CRITICAL CHANGE: Use PARSeq instead of CRNN for much better accuracy
  reco_arch: "crnn_vgg16_bn"           # CHANGED: from crnn_vgg16_bn to parseq
  assume_straight_pages: true

  # ============================================================
  # DETECTION THRESHOLDS - OPTIMIZED FOR AADHAAR
  # ============================================================
  # Lower thresholds to catch faint text on Aadhaar cards
  # Aadhaar has colored backgrounds and security patterns
  bin_thresh: 0.15    # CHANGED: from 0.5 to 0.15 (more sensitive)
  box_thresh: 0.1     # CHANGED: from 0.5 to 0.1 (keep more boxes)

recognition:
  variant: "printed"
  num_beams: 4
  max_length: 128

trocr:
  variant: "printed"
  num_beams: 4
  max_length: 128

# ============================================================
# CONFIDENCE THRESHOLDS
# ============================================================
# Lower threshold to keep more text (including Aadhaar numbers)
min_confidence: 0.3    # CHANGED: from 0.5 to 0.3

# ============================================================
# POST-PROCESSING - Optimized for Aadhaar
# ============================================================
post_process:
  # Basic filters - lower to keep more text
  min_confidence: 0.3        # CHANGED: Match global setting
  min_text_length: 1         # CHANGED: from 2 to 1 (keep single digits like Aadhaar numbers)
  
  # NMS (Non-Maximum Suppression)
  nms_iou_threshold: 0.5     # Keep as is
  
  # Noise filtering
  filter_noise: true
  
  # Column detection
  column_detection: true
  min_col_gap_fraction: 0.06
  
  # Reading order
  enable_reading_order: true
  
  # ============================================================
  # LINE MERGING - Optimized for Aadhaar
  # ============================================================
  enable_merge: true
  merge_threshold: 15        # CHANGED: from 20 to 15 (tighter merging)
  large_text_merge_boost: 2.0  # CHANGED: from 2.5 to 2.0
  large_text_height_px: 30   # CHANGED: from 40 to 30 (smaller text on Aadhaar)
  
  # Column bleeding fix
  max_merge_x_fraction: 0.25  # CHANGED: from 0.30 to 0.25
  
  # ============================================================
  # LOGO SUPPRESSION
  # ============================================================
  logo_zone_x_fraction: 0.20
  logo_zone_y_fraction: 0.18
  logo_top_band_y_fraction: 0.06
  
  # ============================================================
  # TABLE STITCHING
  # ============================================================
  enable_desc_stitch: true
  
  # ============================================================
  # TEXT NORMALISATION
  # ============================================================
  enable_text_normalisation: true   # Just removes extra spaces
  
  # ============================================================
  # ENGLISH-ONLY FILTER - REMOVES HINDI AND OTHER SCRIPTS
  # ============================================================
  english_only: true  # Keep this to filter out Hindi text

# ============================================================
# OUTPUT SETTINGS
# ============================================================
output:
  save_images: true
  json_output_dir: "output/json"
  image_output_dir: "output/images"