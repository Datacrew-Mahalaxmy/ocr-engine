# ============================================================
# Transformer OCR System — Configuration v8 (MAXIMUM EXTRACTION)
# ============================================================
# Goal: Extract as much text as possible, filter later
# ============================================================

device: "cpu"       # "cpu" | "cuda"

# ============================================================
# DPI Settings - Higher for better small text detection
# ============================================================
dpi: 400  # Increased from 300 to catch small text

dpi_settings:
  digital:        200   # Increased from 150
  scanned:        400   # Increased from 300

# ============================================================
# OCR Engine - Fixed to doctr
# ============================================================
engine: "doctr"     # Fixed to doctr

surya:
  langs: ["en"]

doctr:
  det_arch: "db_resnet50"
  # Keeping CRNN for now
  reco_arch: "crnn_vgg16_bn"  # Changed from "crnn_vgg16_bn" to "sar_resnet31"
  assume_straight_pages: true

  # ============================================================
  # DETECTION THRESHOLDS - MUCH LOWER to catch faint text
  # ============================================================
  # Changed from 0.5/0.5 to catch more text regions
  bin_thresh: 0.15    # Lowered from 0.5 - more sensitive
  box_thresh: 0.1     # Lowered from 0.5 - keep more boxes

recognition:
  variant: "printed"
  num_beams: 4
  max_length: 128

trocr:
  variant: "printed"
  num_beams: 4
  max_length: 128

# ============================================================
# CONFIDENCE THRESHOLDS - MUCH LOWER to keep everything
# ============================================================
min_confidence: 0.2    # Lowered from 0.5 - keep lower confidence text

# ============================================================
# POST-PROCESSING - Minimal filtering for now
# ============================================================
post_process:
  # Basic filters - very permissive
  min_confidence: 0.2        # Match global setting
  min_text_length: 1         # Changed from 2 - keep single characters
  
  # NMS (Non-Maximum Suppression) - less aggressive
  nms_iou_threshold: 0.7     # Increased from 0.5 - keep more overlapping boxes
  
  # Noise filtering - OFF for now
  filter_noise: true        # Changed from true - keep everything
  
  # Column detection - OFF for now
  column_detection: true   # Changed from true - simpler first
  
  # Reading order
  enable_reading_order: true
  
  # ============================================================
  # LINE MERGING - OFF for now to see raw words
  # ============================================================
  enable_merge: false        # Changed from true - see individual words first
  merge_threshold: 30        # Increased from 20
  large_text_merge_boost: 2.5
  large_text_height_px: 40
  
  # Column bleeding fix
  max_merge_x_fraction: 0.40  # Increased from 0.30
  
  # ============================================================
  # LOGO SUPPRESSION - OFF
  # ============================================================
  logo_zone_x_fraction: 0.20
  logo_zone_y_fraction: 0.18
  logo_top_band_y_fraction: 0.06
  
  # ============================================================
  # TABLE STITCHING - OFF for now
  # ============================================================
  enable_desc_stitch: false   # Changed from true
  
  # ============================================================
  # TEXT NORMALISATION - ON (harmless)
  # ============================================================
  enable_text_normalisation: true
  
  # ============================================================
  # ENGLISH-ONLY FILTER - OFF to see everything
  # ============================================================
  english_only: true        # Changed from true - see non-English too

